{% extends 'base.html' %}

{% block content %}
<div class="form-box">
    <h2>Edit Project</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Update Project</button>
        <a href="{% url 'projects' %}" style="margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
